// cspell:word getenv
apply plugin: 'com.android.application'

android {
    namespace = "com.snappy.app"
    compileSdk rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    defaultConfig {
        applicationId "com.snappy.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        ndk {
            abiFilters "arm64-v8a"
        }
    }
    signingConfigs {
        snappy {
            storeFile file(System.getenv("SNAPPY_KEYSTORE"))
            storePassword System.getenv("SNAPPY_KEYSTORE_PASSWORD")
            keyAlias System.getenv("SNAPPY_KEY_ALIAS")
            keyPassword System.getenv("SNAPPY_KEYSTORE_PASSWORD")
        }
    }
    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            buildConfigField "String", "APP_URL", "\"https://home.local/app\""
            signingConfig signingConfigs.snappy
        }
        release {
            buildConfigField "String", "APP_URL", "\"https://snappy-ai.ru/app\""
            minifyEnabled true
            shrinkResources = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.snappy
        }
    }
}

dependencies {
    implementation "androidx.activity:activity:$androidxActivityVersion"
    implementation "androidx.core:core:$androidxCoreVersion"
}
