name: Setup Android
description: Fix gradlew permissions and select Java 21 for Android build
runs:
  using: composite
  steps:
    - name: 🔧 Fix gradlew permissions
      shell: bash
      run: chmod +x packages/app-android/android/gradlew

    - name: ☕ Use Java 21
      shell: bash
      run: echo "JAVA_HOME=$JAVA_HOME_21_X64" >> $GITHUB_ENV
