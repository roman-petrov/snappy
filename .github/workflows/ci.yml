name: 🔁 CI

on:
  workflow_dispatch: # Только ручной запуск через GitHub UI

jobs:
  ci:
    name: ${{ matrix.task.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: 🌐 build:site
            arg: build:site
          - name: 📱 build:app
            arg: build:app
          - name: ⚡ build:ssr
            arg: build:ssr
          - name: 🧪 test
            arg: test
          - name: 📘 tsc
            arg: tsc
          - name: 🔍 eslint
            arg: eslint
          - name: ✨ prettier
            arg: prettier
          - name: 📝 cspell
            arg: cspell
          - name: 📋 jscpd
            arg: jscpd
          - name: 🧹 knip
            arg: knip
          - name: 📄 markdown
            arg: markdown

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🐰 Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: ▶️ Run ${{ matrix.task.name }}
        run: bun do ${{ matrix.task.arg }}
