name: 🔁 CI

on:
  workflow_dispatch: # Только ручной запуск через GitHub UI

jobs:
  ci:
    name: ${{ matrix.task.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: 🌐 build:site
            arg: build:site
          - name: ⚡ build:ssr
            arg: build:ssr
          - name: 🖥️ build:app-desktop
            arg: build:app-desktop
          - name: 📱 build:app-mobile
            arg: build:app-mobile
          - name: 🤖 build:app-android
            arg: build:app-android
          - name: 🧪 test
            arg: test
          - name: 📘 tsc
            arg: tsc
          - name: 🔍 eslint
            arg: eslint
          - name: ✨ prettier
            arg: prettier
          - name: 📝 cspell
            arg: cspell
          - name: 📋 jscpd
            arg: jscpd
          - name: 🧹 knip
            arg: knip
          - name: 📄 markdownlint
            arg: markdownlint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🐰 Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🤖 Setup Android
        if: matrix.task.arg == 'build:app-android'
        uses: ./.github/actions/setup-android

      - name: 📱 Build Android App
        if: matrix.task.arg == 'build:app-android'
        run: bun do build:app-mobile

      - name: ▶️ Run ${{ matrix.task.name }}
        run: bun do ${{ matrix.task.arg }}
