# cspell:words webfactory
name: 🚀 Deploy

on:
  workflow_dispatch:
    inputs:
      disable-cache:
        description: "🧹 Disable Gradle cache"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: 📦 Build and migrate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🐰 Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🌐 Build site
        run: bun do build:site

      - name: ⚡ Build SSR
        run: bun do build:ssr

      - name: 🖥️ Build desktop app
        run: bun do build:app-desktop

      - name: 📱 Build mobile app
        run: bun do build:app-mobile

      - name: 🔧 Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-disabled: ${{ inputs.disable-cache }}

      - name: 🔧 Setup Android
        uses: ./.github/actions/setup-android

      - name: 🧹 Clean Android (full rebuild)
        if: ${{ inputs.disable-cache }}
        run: cd packages/app-android/android && ./gradlew clean

      - name: 🤖 Build Android app
        run: bun do build:app-android

      - name: 📥 Apply migrations
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: bun do db:migrate:deploy

      - name: 📦 Create deploy archive
        run: |
          tar --exclude=node_modules --exclude=.git --exclude=.jscpd --exclude=.cursor --exclude=.vscode --exclude=.analyze --exclude=.github -czf /tmp/snappy.tar.gz .

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📤 Copy archive to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -o StrictHostKeyChecking=no /tmp/snappy.tar.gz "${SSH_USER}@${SSH_HOST}:/tmp/snappy.tar.gz"

      - name: 🚀 Extract and run on server
        env:
          SNAPPY_VERSION: ${{ github.sha }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GIGACHAT_AUTH_KEY: ${{ secrets.GIGACHAT_AUTH_KEY }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
          YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
          SSL_CERT_PEM: ${{ secrets.SSL_CERT_PEM }}
          SSL_KEY_PEM: ${{ secrets.SSL_KEY_PEM }}
        run: |
          ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            SNAPPY_VERSION="${SNAPPY_VERSION}" \
            DB_HOST="${DB_HOST}" \
            DB_PORT="${DB_PORT}" \
            DB_USER="${DB_USER}" \
            DB_PASSWORD="${DB_PASSWORD}" \
            DB_NAME="${DB_NAME}" \
            BOT_TOKEN="${BOT_TOKEN}" \
            BOT_API_KEY="${BOT_API_KEY}" \
            JWT_SECRET="${JWT_SECRET}" \
            GIGACHAT_AUTH_KEY="${GIGACHAT_AUTH_KEY}" \
            YOOKASSA_SECRET_KEY="${YOOKASSA_SECRET_KEY}" \
            YOOKASSA_SHOP_ID="${YOOKASSA_SHOP_ID}" \
            SSL_CERT_PEM="$(echo -n "$SSL_CERT_PEM" | base64 -w 0)" \
            SSL_KEY_PEM="$(echo -n "$SSL_KEY_PEM" | base64 -w 0)" \
            "bash -s" < .github/scripts/deploy.sh
