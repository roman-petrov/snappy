# cspell:words webfactory
name: 🚀 Deploy

on:
  workflow_dispatch:

jobs:
  build:
    name: 📦 Build and migrate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🐰 Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔨 Build
        run: bun do build

      - name: 📥 Apply migrations
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: bun do db:migrate:deploy

      - name: 📦 Create deploy archive
        run: |
          tar --exclude=node_modules --exclude=.git --exclude=.jscpd --exclude=.cursor --exclude=.vscode --exclude=.analyze --exclude=.github -czf /tmp/snappy.tar.gz .
          mv /tmp/snappy.tar.gz .

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: snappy-deploy
          path: snappy.tar.gz

  deploy:
    name: 🚀 Deploy to production
    runs-on: ubuntu-latest
    environment: production
    needs: build

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📥 Download artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: snappy-deploy

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📤 Copy archive to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -o StrictHostKeyChecking=no snappy.tar.gz "${SSH_USER}@${SSH_HOST}:/tmp/snappy.tar.gz"

      - name: 🚀 Extract and run on server
        env:
          SNAPPY_VERSION: ${{ github.sha }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GIGACHAT_AUTH_KEY: ${{ secrets.GIGACHAT_AUTH_KEY }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
          YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
          SSL_CERT_PEM: ${{ secrets.SSL_CERT_PEM }}
          SSL_KEY_PEM: ${{ secrets.SSL_KEY_PEM }}
        run: |
          ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            SNAPPY_VERSION="${SNAPPY_VERSION}" \
            DB_HOST="${DB_HOST}" \
            DB_PORT="${DB_PORT}" \
            DB_USER="${DB_USER}" \
            DB_PASSWORD="${DB_PASSWORD}" \
            DB_NAME="${DB_NAME}" \
            BOT_TOKEN="${BOT_TOKEN}" \
            BOT_API_KEY="${BOT_API_KEY}" \
            JWT_SECRET="${JWT_SECRET}" \
            GIGACHAT_AUTH_KEY="${GIGACHAT_AUTH_KEY}" \
            YOOKASSA_SECRET_KEY="${YOOKASSA_SECRET_KEY}" \
            YOOKASSA_SHOP_ID="${YOOKASSA_SHOP_ID}" \
            SSL_CERT_PEM="$(echo -n "$SSL_CERT_PEM" | base64 -w 0)" \
            SSL_KEY_PEM="$(echo -n "$SSL_KEY_PEM" | base64 -w 0)" \
            "bash -s" < .github/scripts/deploy.sh
