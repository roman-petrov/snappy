# cspell:words webfactory aitunnel
name: 🚀 Deploy

on:
  workflow_dispatch:
    inputs:
      disable-cache:
        description: "🧹 Disable Gradle cache"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup repository
        uses: ./.github/actions/setup-repo

      - name: 🔧 Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: ${{ inputs.disable-cache }}

      - name: 🔧 Setup Android
        uses: ./.github/actions/setup-android

      - name: 🧹 Clean Android (full rebuild)
        if: ${{ inputs.disable-cache }}
        run: cd packages/app-android/android && ./gradlew clean

      - name: 🌐 Build site
        run: bun do build:site

      - name: ⚡ Build SSR
        run: bun do build:ssr

      - name: 💻 Build app
        run: bun do build:app

      - name: 🛡️ Build admin
        run: bun do build:admin

      - name: 🏭 Build server
        run: bun do build:server

      - name: 🤖 Build Android app
        run: bun do build:app-android

      - name: 📦 Create deploy archive
        run: |
          tar --exclude=node_modules --exclude=.git --exclude=.jscpd --exclude=.cursor --exclude=.vscode --exclude=.analyze --exclude=.github -czf /tmp/snappy.tar.gz .

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📤 Copy archive to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -o StrictHostKeyChecking=no /tmp/snappy.tar.gz "${SSH_USER}@${SSH_HOST}:/tmp/snappy.tar.gz"

      - name: 🚀 Extract and run on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SECRETS_KEY: ${{ secrets.SECRETS_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" "SECRETS_KEY=$(printf '%q' "${SECRETS_KEY}") bash -s" <<EOF
          $(cat .github/scripts/setup_node.sh .github/scripts/setup_bun.sh .github/scripts/setup_pm2.sh .github/scripts/deploy.sh)
          EOF

      - name: 🩺 Health check
        run: bash .github/scripts/health_check.sh
